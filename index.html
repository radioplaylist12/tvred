    let canalAtual = null;
    let timerAviso = null;
    let controlesVisiveis = true;
    const btnToggle = document.getElementById('btnToggle');
    const controlesDiv = document.getElementById('controles');
    const playerIframe = document.getElementById('playerIframe');

    function init() {
      renderizarLista();
      if (listaCanais.length) abrirCanal(listaCanais[0].id);
      configurarEventos();
      controlesDiv.classList.remove('oculto');
      btnToggle.innerHTML = '<i class="fas fa-eye"></i>';
      btnToggle.addEventListener('click', toggleControles);
    }

    function toggleControles() {
      controlesVisiveis = !controlesVisiveis;
      if (controlesVisiveis) {
        controlesDiv.classList.remove('oculto');
        btnToggle.innerHTML = '<i class="fas fa-eye"></i>';
      } else {
        controlesDiv.classList.add('oculto');
        btnToggle.innerHTML = '<i class="fas fa-eye-slash"></i>';
      }
    }

    function renderizarLista() {
      const container = document.getElementById('listaCanais');
      if (!container) return;
      let html = '';
      listaCanais.forEach(c => {
        html += `
          <div class="item-canal" data-id="${c.id}">
            <div class="capa-canal">${ICON_SVG}</div>
            <div class="info-canal"><h3>${c.nome}</h3></div>
          </div>
        `;
      });
      container.innerHTML = html;
      document.querySelectorAll('.item-canal').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.getAttribute('data-id');
          if (id) abrirCanal(id);
          fecharMenu();
        });
      });
    }

    function destacarCanalAtivo(id) {
      document.querySelectorAll('.item-canal').forEach(el => {
        el.classList.remove('ativo');
        if (el.getAttribute('data-id') === id) el.classList.add('ativo');
      });
    }

    function abrirCanal(id) {
      const canal = listaCanais.find(c => c.id === id);
      if (!canal) return;
      canalAtual = canal;
      destacarCanalAtivo(id);
      mostrarAviso(canal.nome);
      playerIframe.src = canal.url;
    }

    function mostrarAviso(msg) {
      const el = document.getElementById('avisoCanal');
      if (!el) return;
      clearTimeout(timerAviso);
      el.innerText = msg;
      el.classList.add('mostrar');
      timerAviso = setTimeout(() => el.classList.remove('mostrar'), 1500);
    }

    function limparCache() {
      if (!canalAtual) return;
      mostrarAviso('Recarregando...');
      playerIframe.src = canalAtual.url;
      setTimeout(() => mostrarAviso(canalAtual.nome), 500);
    }

    function proximoCanal() {
      const idx = listaCanais.findIndex(c => c.id === canalAtual.id);
      const next = listaCanais[(idx + 1) % listaCanais.length];
      abrirCanal(next.id);
    }

    function canalAnterior() {
      const idx = listaCanais.findIndex(c => c.id === canalAtual.id);
      const prev = listaCanais[(idx - 1 + listaCanais.length) % listaCanais.length];
      abrirCanal(prev.id);
    }

    function embaralharCanais() {
      for (let i = listaCanais.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [listaCanais[i], listaCanais[j]] = [listaCanais[j], listaCanais[i]];
      }
      renderizarLista();
      const aleatorio = listaCanais[Math.floor(Math.random() * listaCanais.length)];
      abrirCanal(aleatorio.id);
      mostrarAviso('Canais embaralhados!');
    }

    function toggleFullScreen() {
      const elem = document.documentElement;
      if (!document.fullscreenElement) {
        elem.requestFullscreen().catch(err => console.log(err));
      } else {
        document.exitFullscreen();
      }
    }

    function configurarEventos() {
      document.getElementById('btnAnterior')?.addEventListener('click', canalAnterior);
      document.getElementById('btnProximo')?.addEventListener('click', proximoCanal);
      document.getElementById('btnLimpar')?.addEventListener('click', limparCache);
      document.getElementById('btnTelaCheia')?.addEventListener('click', toggleFullScreen);
      document.getElementById('btnEmbaralhar')?.addEventListener('click', embaralharCanais);
      document.getElementById('btnMenu')?.addEventListener('click', toggleMenu);
      document.getElementById('btnFecharMenu')?.addEventListener('click', fecharMenu);
      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp') { e.preventDefault(); canalAnterior(); }
        if (e.key === 'ArrowDown') { e.preventDefault(); proximoCanal(); }
        if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullScreen(); }
      });
    }

    function toggleMenu() {
      document.getElementById('menuLateral')?.classList.toggle('aberto');
    }
    function fecharMenu() {
      document.getElementById('menuLateral')?.classList.remove('aberto');
    }

    init();
  </script>
